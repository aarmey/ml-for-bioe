toc: true
toc-title: "Outline"
toc-depth: 1
format-links: false

project:
  post-render: ./webp-cleanup-png.sh

format:
  typst:
    mainfont: "Helvetica"
    fontsize: 9pt
    margin:
      left: 0.5in
      right: 4in
      y: 0.5in
    filters:
      - webp-to-png.lua
  html:
    embed-resources: true
    theme: [default, pubnotes.scss]
  revealjs:
    theme: [default, clean.scss]
    menu:
      side: left
    slide-number: true
    date-format: long
    chalkboard: true